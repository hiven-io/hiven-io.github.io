<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiven</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t');
      var id = p.get('id') || p.get('u');
      var map = { e: 'experience', p: 'place', u: 'user' };
      if (t && id && map[t]) {
        location.replace('hiven://' + map[t] + '/' + id);
      }
      // Fallback: redireciona para a landing page após 2,5 s.
      setTimeout(function () { location.replace('/'); }, 2500);
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF7F5;
      color: #2A2320;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #BE123C;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo span { color: #FFF8F5; font-size: 32px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="logo"><span>H</span></div>
</body>
</html>
